# golangci-lint 配置(v2 格式,golangci-lint >= v2.0)。运行: golangci-lint run ./...
# Makefile lint 目标会在 golangci-lint 已安装时自动使用。
version: "2"

run:
  timeout: 3m

linters:
  default: none
  enable:
    - errcheck        # 检查未处理的错误
    - govet           # go vet
    - ineffassign     # 无效赋值
    - staticcheck     # 综合静态分析
    - unused          # 未使用代码
    - misspell        # 拼写
    - gosec           # 安全
    - gocritic        # 性能/风格启发
    - gocyclo         # 圈复杂度(阈值见 settings)
    - bodyclose       # http.Response.Body 必须关闭
    - revive          # 风格规则(仅启用低噪音子集,见 settings)
  formatters:
    enable:
      - gofmt         # 格式统一
      - goimports     # import 分组与排序
  settings:
    gosec:
      excludes:
        - G104  # 未检查错误已由 errcheck 覆盖,且本项目多处显式 _ = 忽略是故意的
        - G301  # 目录权限 0o755 是文件存储标准权限,非安全问题
    errcheck:
      exclude-functions:
        - (net/http.ResponseWriter).Write
    gocyclo:
      min-complexity: 30  # golangci 默认值;现有热点函数(main/Validate/ChatStream 等)留待后续重构,但拦住新增超复杂函数
    # revive 仅启用低噪音子集;刻意排除 exported(要求导出符号带 godoc 注释,
    # 与现有代码冲突大、噪音多于收益),待注释规范化后再单独打开。
    revive:
      rules:
        - name: var-naming          # 命名规范(导出符号首字母大写等)
        - name: error-return        # error 必须为返回值列表最后一个
        - name: errorf              # 用 fmt.Errorf 而非 fmt.Sprintf+errors.New
        - name: increment-decrement # i++ 优先于 i += 1
        - name: unreachable-code    # 死代码
        - name: context-as-argument # context 必须为首个参数
  exclusions:
    rules:
      # 测试代码放宽
      - path: _test\.go
        linters: [gosec, gocritic, errcheck]
      # cmd 下的 main 包允许较宽松
      - path: cmd/
        linters: [gocritic]
      # defer Close/Rollback 是 Go 惯用资源清理,其错误无需处理。
      - linters: [errcheck]
        source: 'defer .+\.(Close|Rollback)\('
      # 向 http.ResponseWriter 写响应体(fmt.Fprint/Fprintf),写入失败也无法有意义地处理。
      - linters: [errcheck]
        source: 'fmt\.(Fprint|Fprintf)\(w[,:]'
